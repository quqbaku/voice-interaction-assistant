# Windows Voice Assistant - 配置文件

# LLM 配置
llm:
  default: "minimax"
  providers:
    minimax:
      api_key: "${MINIMAX_API_KEY}"
      model: "MiniMax-M2.7"
      base_url: "https://api.minimaxi.com/v1"
      temperature: 1.0
      max_tokens: 4096
      reasoning_split: true  # 启用思维链分离
    openai:
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4o"
      base_url: "https://api.openai.com/v1"
      temperature: 0.7
      max_tokens: 2000
    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-sonnet-4-20250514"
      base_url: "https://api.anthropic.com/v1"
      temperature: 0.7
      max_tokens: 2000
    ollama:
      base_url: "http://localhost:11434/v1"
      model: "llama3"
      temperature: 0.7

# 唤醒词配置
wake_words:
  - 你好小猪
  - 小助手
  - 助手
  - 你好助手

# 语音配置
speech:
  engine: "sherpaonnx"  # sherpaonnx / google
  model_path: "models/sense_voice"
  language: "zh-CN"
  tts_engine: "pyttsx3"  # pyttsx3 / edge-tts

# 应用配置
app:
  scan_paths:
    - "C:\\Program Files"
    - "C:\\Program Files (x86)"
    - "%APPDATA%\\Microsoft\\Windows\\Start Menu\\Programs"
    - "%USERPROFILE%\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs"
  app_map_path: "config/app_map.json"

# 插件配置
plugins:
  path: "plugins"
  enabled: true

# 日志配置
logging:
  level: "INFO"
  file: "assistant.log"

# 功能开关
features:
  enable_wake_word: false
  enable_asr_correction: true
  enable_douyin_control: true
  confirm_dangerous_actions: true  # 关机/重启需确认
